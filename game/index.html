<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>STONE PAPER SCISSOR</h1>
    </header>
    <div class="gameContainer">
        <p>Please Select Your Choice</p>
        <div class="options-box">
            <div class="opt" id="Rock"><img src="images/rock.png" alt="Rock"></div>
            <div class="opt" id="Paper"><img src="images/paper.png" alt="Rock"></div>
            <div class="opt" id="Scissor"><img src="images/scissors.png" alt="Rock"></div>
        </div>
        <div class="choices-box">
            <div class="choice1">Your chose : <span class="urChoice">0</span></div>
            <div class="choice2">Computer chose : <span class="compChoice">0</span></div>
        </div>
        <button class="start button">
            START 
        </button>
        <div class="score-box">
            <div class="score1">
                <div class="urScore score">0</div>
                You
            </div>
            <div class="score2">
                <div class="compScore score">0</div>
                Comp
            </div>
        </div>
    
    <button class="end button">End Game</button></div>
</body>
<script src="script.js"></script>
</html>
